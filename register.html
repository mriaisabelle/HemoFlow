    <script>
        function switchRole(role) {
            const tabs = ['donor', 'hospital'];
            const subtitle = document.getElementById('role-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const bloodTypeBox = document.getElementById('blood-type-container');
            const roleInput = document.getElementById('role-input');

            // Update hidden input for PHP
            roleInput.value = role;

            tabs.forEach(t => {
                const el = document.getElementById('tab-' + t);
                if (t === role) {
                    el.classList.add('tab-active');
                    el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('tab-active');
                    el.classList.add('text-gray-400');
                }
            });

            subtitle.style.opacity = '0';
            setTimeout(() => {
                if (role === 'hospital') {
                    subtitle.innerText = "Connect your facility to HemoFlow";
                    submitBtn.innerText = "Register Hospital";
                    bloodTypeBox.style.visibility = 'hidden';
                } else {
                    subtitle.innerText = "Join our life-saving community";
                    submitBtn.innerText = "Create Account";
                    bloodTypeBox.style.visibility = 'visible';
                }
                subtitle.style.opacity = '1';
            }, 150);
        }
    </script>
